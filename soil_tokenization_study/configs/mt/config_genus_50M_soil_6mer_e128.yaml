cfgs:
  dataset: genus_refSoil_50M
  model: classification_transformer_128
  optimizer: adam

paths:
  data_path_root: /work/ymj1123ntu/mt50m_soil
  vocabulary_path: /work/ymj1123ntu/vocab_file/vocab_6mer.txt
  class_weight_path: null

common:
  experiment_name: ???
  prepend_cls_token: false
  resume_model: false

hashing:
  num_buckets: 22
  num_hash_functions: 6

multi_level_cls:
  use: false
  ranks: Genome,Genus
  num_classes: 1535,120

mdl_common:
  input_module: vocab
  kmer_size: 6
  kmer_stride: 1          # 6-mer @ embed128 (gut-0.489 recipe): give 6-mer adequate capacity; sparse off (tiny vocab)
  num_classes: 500        # 500-wide head, aligned with MT-full (labels 0-314 populated)
  class_indices: 1        # header split("|")[1] = genus_idx
  classification_threshold: 0.5
  sparse_embedding: false

device_settings:
  use_cpu: false
  gpu_count: 1
  gpu_ids: 0
  split_gpus: false

dataloader:
  batch_size: 2048        # V100-32GB OK at embed_dim=64
  num_workers: 8          # gp2d gives 4 CPU/GPU; train has >=16 shards, val 8 shards -> 8 divides both

training:
  save_interval: 1
  logging_interval: 100
  evaluation_interval: 10000   # 50M epoch ~24k batches; large interval so eval overhead is negligible (NOT the 5M-only value of 200)
  max_epochs: 15               # in-process epochs (~gut 895686 exposure that reached 0.874); early-stop usually fires first
  max_steps: 400000            # hard ceiling (15 epochs x ~24k = ~366k)
  early_stop_threshold: 10     # 10 evals (=100k batches) without val improvement -> stop
  save_top_n_models: 2
  use_cudnn_benchmark: true
  monitor_metric: min loss/val
  amp: true
  lr_scheduler_enabled: false
  warmup_lr_scheduler_enabled: false

dataset:
  train_set_path: /work/ymj1123ntu/mt50m_soil/data/train
  validation_set_path: /work/ymj1123ntu/mt50m_soil/data/val

optimizer:
  _target_: torch.optim.Adam
  lr: 0.001

# NOTE: model/dataset/optimizer blocks above are overwritten at runtime by
# context_manager.py from <this-dir>/{model,dataset,optimizer}/*.yaml (see MT-5M note).
