# NT-v2 soil genus — 5M train (Taiwania2). Matched to MT-5M for tokenization comparison.
# EDIT the 3 data paths + output dir if your layout differs.
model:
  backbone: "InstaDeepAI/nucleotide-transformer-v2-500m-multi-species"   # must be reachable / pre-cached on TWCC (see README)
  head_type: "attention_pool"
  head_config: {hidden_dim: 512, num_attention_heads: 4, dropout: 0.15}
  freeze_backbone: false
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: ["query", "key", "value"]
  gradient_checkpointing: true
data:
  fasta_path:  "/work/ymj1123ntu/mt5m_soil/ntv2_data/nt_soil_train_50M.fa"
  labels_path: "/work/ymj1123ntu/mt5m_soil/ntv2_data/nt_soil_train_50M_labels.tsv"
  val_ratio: 0.05
  seed: 42
  max_token_length: 32
  task: "genus"
  rc_augment: false
training:
  batch_size: 384          # A100: can raise to 512-768; keep if V100 32GB
  eval_batch_size: 768
  gradient_accumulation_steps: 1
  num_epochs: 6
  learning_rate: 5.0e-4
  backbone_lr: 3.0e-5
  weight_decay: 0.02
  warmup_ratio: 0.05
  amp: true
  max_grad_norm: 5.0
  early_stopping_patience: 2
  checkpoint_every_steps: 2000   # 50M epoch ~124k steps @ ~26h; save last.pt every ~24min so a
                                 # 48h-walltime timeout loses minutes, not a whole epoch (resume
                                 # continues from step_in_epoch with the LR schedule aligned)
  num_workers: 2   # 50M: load_data holds 47.5M read strings; each forked worker copies them
                   # (refcount breaks copy-on-write). 8 workers OOM'd the 90GB cap at ~8.7h.
                   # dataloader is 240x faster than GPU needs, so 2 workers is plenty (no slowdown).
output:
  dir: "/work/ymj1123ntu/mt5m_soil/results/nt_soil_genus_50M"
