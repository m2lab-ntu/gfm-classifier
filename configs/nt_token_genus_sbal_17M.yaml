# ============================================================
# Token-level GFM Classifier — Genus, 17.64M SPECIES-BALANCED (control)
# ============================================================
# Advisor-requested experiment (independent of v9/v14/v15).
# SPECIES-balanced: 11,491 reads per species × 1535 species ≈ 17.64M,
# subsampled (no upsampling) from the correct species-balanced
# 250M (1535sp). Paired with nt_token_genus_sbal_17M.yaml, which
# is IDENTICAL except it is SPECIES-balanced at the same 17.64M
# total — so the only difference is the balance axis.
# From scratch, v9/v14 recipe (class_weights=false). Single-line
# FASTA (no _read_seq truncation). Eval on the clean train-disjoint
# test, BOTH per-read-natural and per-genus-flat metrics.
# ============================================================

# ===== Model =====
model:
  backbone: "InstaDeepAI/nucleotide-transformer-v2-500m-multi-species"
  head_type: "attention_pool"
  head_config:
    hidden_dim: 512
    num_attention_heads: 4
    dropout: 0.15
  freeze_backbone: false
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: ["query", "key", "value"]
  gradient_checkpointing: true
  trust_remote_code: true

# ===== Data =====
data:
  fasta_path: "/work/ymj1123ntu/data/balanced_species_17M/reads.fa"
  labels_path: "/work/ymj1123ntu/data/balanced_species_17M/labels.tsv"
  val_ratio: 0.02
  seed: 42
  max_token_length: 32
  task: "genus"
  rc_augment: true

# ===== Training =====
training:
  batch_size: 256           # per-GPU (256 × 8 GPUs = 2048 effective)
  eval_batch_size: 512
  gradient_accumulation_steps: 1
  num_epochs: 30
  learning_rate: 3.0e-4
  backbone_lr: 2.0e-5
  weight_decay: 0.02
  warmup_ratio: 0.03
  amp: true
  max_grad_norm: 5.0
  early_stopping_patience: 5
  num_workers: 8
  label_smoothing: 0.0
  class_weights: false
  logit_adjustment: false

# ===== Output =====
output:
  dir: "/work/ymj1123ntu/checkpoints/nt_token_genus_sbal_17M"
