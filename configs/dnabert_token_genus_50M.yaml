# ============================================================
# DNABERT (overlapping 6-mer) — Genus Classification @ 50M
# ============================================================
# Direct scaled comparison to NT-v2 v9 (50M, 64.45% val acc).
# Same data volume → isolates tokenization effect at thesis-scale data.
# ============================================================

# ===== Model =====
model:
  backbone: "zhihan1996/DNA_bert_6"
  backbone_loader: "mlm"
  trust_remote_code: false          # DNABERT's custom BertConfig clashes with stock
  head_type: "attention_pool"
  head_config:
    hidden_dim: 512
    num_attention_heads: 4
    dropout: 0.15
  freeze_backbone: false
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: ["query", "key", "value"]
  gradient_checkpointing: true

# ===== Data =====
data:
  fasta_path: "/work/ymj1123ntu/gfm_embedding_classification/data/balanced_50M/reads_50M.fa"
  labels_path: "/work/ymj1123ntu/gfm_embedding_classification/data/balanced_50M/labels_50M.tsv"
  val_ratio: 0.1
  seed: 42
  max_token_length: 160
  task: "genus"
  rc_augment: true
  kmer_preprocess:
    k: 6
    stride: 1

# ===== Training =====
training:
  # DNABERT seq is ~5× longer than NT-v2's; batch=128 holds on H100.
  # 50M data × 30 epochs likely won't fit 48h — plan for resume (see v9 pattern).
  batch_size: 128
  eval_batch_size: 256
  gradient_accumulation_steps: 1
  num_epochs: 30
  learning_rate: 5.0e-4
  backbone_lr: 3.0e-5
  weight_decay: 0.02
  warmup_ratio: 0.05
  amp: true
  max_grad_norm: 5.0
  early_stopping_patience: 5
  num_workers: 4
  label_smoothing: 0.0
  class_weights: false
  max_class_weight: 10.0
  phase1_epochs: 0

# ===== Output =====
output:
  dir: "/work/ymj1123ntu/token_level_gfm_classifier/results/dnabert_token_genus_50M"
