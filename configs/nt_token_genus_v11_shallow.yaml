# ============================================================
# Token-level GFM Classifier — Genus Classification (v11)
# ============================================================
# ABLATION: Replace 29-layer NT-v2 backbone with a single-layer
# Transformer trained from scratch (MetaTransformer-style).
# Same 6-mer tokenizer, same attention pooling head, same data.
#
# Purpose: Isolate the contribution of the pre-trained 29-layer
# backbone vs a simple shallow encoder under fixed tokenization.
#
# MetaTransformer reference: d_model=128, 1 layer, 2 heads, d_ff=512
# ============================================================

# ===== Model =====
model:
  type: "shallow_transformer"
  backbone: "InstaDeepAI/nucleotide-transformer-v2-500m-multi-species"  # only for tokenizer
  head_type: "attention_pool"
  head_config:
    hidden_dim: 512
    num_attention_heads: 4
    dropout: 0.15
  max_seq_len: 128
  shallow_config:
    d_model: 128
    nhead: 2
    d_ff: 512
    num_layers: 1
    dropout: 0.1

# ===== Data =====
data:
  fasta_path: "/work/ymj1123ntu/gfm_embedding_classification/data/balanced_50M/reads_50M.fa"
  labels_path: "/work/ymj1123ntu/gfm_embedding_classification/data/balanced_50M/labels_50M.tsv"
  val_ratio: 0.1
  seed: 42
  max_token_length: 32
  task: "genus"
  rc_augment: true

# ===== Training =====
training:
  batch_size: 512
  eval_batch_size: 1024
  gradient_accumulation_steps: 1
  num_epochs: 15
  learning_rate: 5.0e-4
  backbone_lr: 5.0e-4
  weight_decay: 0.02
  warmup_ratio: 0.05
  amp: true
  max_grad_norm: 5.0
  early_stopping_patience: 5
  num_workers: 4
  label_smoothing: 0.0
  class_weights: false
  max_class_weight: 10.0
  phase1_epochs: 0

# ===== Output =====
output:
  dir: "/work/ymj1123ntu/token_level_gfm_classifier/results/nt_token_genus_v11_shallow"
