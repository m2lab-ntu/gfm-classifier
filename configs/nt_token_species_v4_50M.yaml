# ============================================================
# Token-level GFM Classifier — Species Classification (v4)
# ============================================================
# Previous species experiments (v1-v3) on 500K: ~8% accuracy
# v4: 50M balanced reads (same data as genus v9)
#     Init from genus v9 best.pt (backbone weights)
#     Expect substantial improvement from data scaling
# ============================================================

# ===== Model =====
model:
  backbone: "InstaDeepAI/nucleotide-transformer-v2-500m-multi-species"
  head_type: "attention_pool"
  head_config:
    hidden_dim: 512
    num_attention_heads: 4
    dropout: 0.15
  freeze_backbone: false
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: ["query", "key", "value"]
  gradient_checkpointing: true

# ===== Data =====
data:
  fasta_path: "/work/ymj1123ntu/gfm_embedding_classification/data/balanced_50M/reads_50M.fa"
  labels_path: "/work/ymj1123ntu/gfm_embedding_classification/data/balanced_50M/labels_50M.tsv"
  val_ratio: 0.1
  seed: 42
  max_token_length: 32
  task: "species"
  rc_augment: true

# ===== Training =====
training:
  batch_size: 256
  eval_batch_size: 512
  gradient_accumulation_steps: 1
  num_epochs: 30
  learning_rate: 5.0e-4
  backbone_lr: 3.0e-5
  weight_decay: 0.02
  warmup_ratio: 0.05
  amp: true
  max_grad_norm: 5.0
  early_stopping_patience: 5
  num_workers: 4
  label_smoothing: 0.0
  class_weights: false
  max_class_weight: 10.0
  phase1_epochs: 0

# ===== Output =====
output:
  dir: "/work/ymj1123ntu/token_level_gfm_classifier/results/nt_token_species_v4_50M"
