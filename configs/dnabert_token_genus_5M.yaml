# ============================================================
# DNABERT (overlapping 6-mer) — Genus Classification
# ============================================================
# Direct comparison to NT-v2: same 6-mer length, stride=1 vs stride=6.
# Isolates the effect of overlapping vs non-overlapping k-mer tokenization.
# DNABERT backbone is ~86M params (BERT-base); NT-v2 is 498M.
# ============================================================

# ===== Model =====
model:
  backbone: "zhihan1996/DNA_bert_6"
  backbone_loader: "mlm"            # BertForMaskedLM → extract .bert
  trust_remote_code: false          # DNABERT's custom BertConfig clashes with stock
  head_type: "attention_pool"
  head_config:
    hidden_dim: 512
    num_attention_heads: 4
    dropout: 0.15
  freeze_backbone: false
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: ["query", "key", "value"]   # standard BERT attention
  gradient_checkpointing: true

# ===== Data =====
data:
  fasta_path: "/work/ymj1123ntu/gfm_embedding_classification/data/balanced_5M/reads_5M.fa"
  labels_path: "/work/ymj1123ntu/gfm_embedding_classification/data/balanced_5M/labels_5M.tsv"
  val_ratio: 0.1
  seed: 42
  # 150bp sequence → stride=1 6-mer → 145 k-mers + [CLS]/[SEP] → ~147 tokens.
  # Round up to 160 to absorb variable RC/edge cases.
  max_token_length: 160
  task: "genus"
  rc_augment: true
  kmer_preprocess:
    k: 6
    stride: 1                        # overlapping (DNABERT's tokenization)

# ===== Training =====
training:
  # Seq length is ~5x longer than NT-v2's 32, so reduce batch size.
  # Attention is O(n²); with smaller backbone (86M vs 498M), batch=128 fits H100.
  batch_size: 128
  eval_batch_size: 256
  gradient_accumulation_steps: 1
  num_epochs: 30
  learning_rate: 5.0e-4
  backbone_lr: 3.0e-5
  weight_decay: 0.02
  warmup_ratio: 0.05
  amp: true
  max_grad_norm: 5.0
  early_stopping_patience: 5
  num_workers: 4
  label_smoothing: 0.0
  class_weights: false
  max_class_weight: 10.0
  phase1_epochs: 0

# ===== Output =====
output:
  dir: "/work/ymj1123ntu/token_level_gfm_classifier/results/dnabert_token_genus_5M"
