# ============================================================
# Token-level GFM Classifier — Genus, Full 258M Dataset (v10)
# ============================================================
# v10: 258M full HGR-UMGS reads (unbalanced, all 2505 genomes)
#      DDP training via train_ddp.py on Nano4 normal partition
#      Baseline: v9 50M → 64.45% (66.05% RC TTA)
#      Expected: +2-5 pp from 5x data scale-up
#      Init from v9 best.pt for faster convergence
# ============================================================

# ===== Model =====
model:
  backbone: "InstaDeepAI/nucleotide-transformer-v2-500m-multi-species"
  head_type: "attention_pool"
  head_config:
    hidden_dim: 512
    num_attention_heads: 4
    dropout: 0.15
  freeze_backbone: false
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: ["query", "key", "value"]
  gradient_checkpointing: true
  trust_remote_code: true

# ===== Data =====
data:
  fasta_path: "/work/ymj1123ntu/data/reads_258M.fa"
  labels_path: "/work/ymj1123ntu/data/labels_258M.tsv"
  val_ratio: 0.02          # 2% val = 5.16M reads, sufficient for early stopping
  seed: 42
  max_token_length: 32
  task: "genus"
  rc_augment: true

# ===== Training =====
training:
  batch_size: 128           # per-GPU  (128 × 64 GPUs = 8192 effective batch)
  eval_batch_size: 512
  gradient_accumulation_steps: 1
  num_epochs: 15            # fewer epochs since data is 5x larger
  learning_rate: 3.0e-4     # slightly lower LR for transfer from v9
  backbone_lr: 2.0e-5
  weight_decay: 0.02
  warmup_ratio: 0.03
  amp: true
  max_grad_norm: 5.0
  early_stopping_patience: 3
  num_workers: 8            # more workers for lazy I/O
  label_smoothing: 0.0
  class_weights: true       # unbalanced data → need class weights
  max_class_weight: 10.0
  logit_adjustment: false

# ===== Output =====
output:
  dir: "/work/ymj1123ntu/checkpoints/nt_token_genus_v10_258M"
