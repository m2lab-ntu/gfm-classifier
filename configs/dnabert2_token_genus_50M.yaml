# ============================================================
# DNABERT-2 (BPE) — Genus Classification @ 50M
# ============================================================
# Scaled comparison to NT-v2 v9 (50M, 64.45% val acc).
# Tests whether learned BPE outperforms non-overlapping 6-mer at thesis scale.
# ============================================================

# ===== Model =====
model:
  backbone: "zhihan1996/DNABERT-2-117M"
  backbone_loader: "base"
  head_type: "attention_pool"
  head_config:
    hidden_dim: 512
    num_attention_heads: 4
    dropout: 0.15
  freeze_backbone: false
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: ["Wqkv"]     # verify on first 5M run
  gradient_checkpointing: false

# ===== Data =====
data:
  fasta_path: "/work/ymj1123ntu/gfm_embedding_classification/data/balanced_50M/reads_50M.fa"
  labels_path: "/work/ymj1123ntu/gfm_embedding_classification/data/balanced_50M/labels_50M.tsv"
  val_ratio: 0.1
  seed: 42
  max_token_length: 64
  task: "genus"
  rc_augment: true
  kmer_preprocess: null

# ===== Training =====
training:
  batch_size: 256
  eval_batch_size: 512
  gradient_accumulation_steps: 1
  num_epochs: 30
  learning_rate: 5.0e-4
  backbone_lr: 3.0e-5
  weight_decay: 0.02
  warmup_ratio: 0.05
  amp: true
  max_grad_norm: 5.0
  early_stopping_patience: 5
  num_workers: 4
  label_smoothing: 0.0
  class_weights: false
  max_class_weight: 10.0
  phase1_epochs: 0

# ===== Output =====
output:
  dir: "/work/ymj1123ntu/token_level_gfm_classifier/results/dnabert2_token_genus_50M"
