# ============================================================
# Token-level GFM Classifier — Genus, 250M BALANCED (v15)
# ============================================================
# v15: same 250M balanced data as v14, but warm-start from v9
#      best.pt (66.60% on 50M). v12 proved LR=3e-4 is too high
#      for warm-start (66.28% → 45% collapse); v15 uses 10× lower
#      LR to preserve learned representations.
#      Goal: test whether more data + warm init beats v14 from scratch.
# ============================================================

# ===== Model =====
model:
  backbone: "InstaDeepAI/nucleotide-transformer-v2-500m-multi-species"
  head_type: "attention_pool"
  head_config:
    hidden_dim: 512
    num_attention_heads: 4
    dropout: 0.15
  freeze_backbone: false
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: ["query", "key", "value"]
  gradient_checkpointing: true
  trust_remote_code: true

# ===== Data =====
data:
  fasta_path: "/work/ymj1123ntu/data/balanced_250M/reads_250M.fa"
  labels_path: "/work/ymj1123ntu/data/balanced_250M/labels_250M.tsv"
  val_ratio: 0.02
  seed: 42
  max_token_length: 32
  task: "genus"
  rc_augment: true

# ===== Training =====
training:
  batch_size: 128           # per-GPU  (128 × 64 GPUs = 8192 effective batch)
  eval_batch_size: 512
  gradient_accumulation_steps: 1
  num_epochs: 15            # warm-start converges faster than from scratch
  learning_rate: 3.0e-5     # 1/10 of v14 from-scratch — v12 proved 3e-4 collapses
  backbone_lr: 2.0e-6       # 1/10 of v14 from-scratch
  weight_decay: 0.02
  warmup_ratio: 0.05        # slightly longer warmup to ease into new data distribution
  amp: true
  max_grad_norm: 5.0
  early_stopping_patience: 3
  num_workers: 8
  label_smoothing: 0.0
  class_weights: false
  logit_adjustment: false

# ===== Output =====
output:
  dir: "/work/ymj1123ntu/checkpoints/nt_token_genus_v15_250M_warmstart"
