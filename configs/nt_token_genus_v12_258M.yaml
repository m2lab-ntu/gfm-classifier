# ============================================================
# Token-level GFM Classifier — Genus, Full 258M Dataset (v12)
# ============================================================
# v12: 258M full HGR-UMGS reads, class_weights=FALSE
#      Key fix: v10 collapsed due to class_weights=true with
#      400:1 imbalance → distorted loss. v9 proved no weights
#      needed (349:1 imbalance → 66.6% without weighting).
#      v12 tests whether scaling to 258M extends v9's result.
#      Init from v9 best.pt (warm-start, epochs=15).
# ============================================================

# ===== Model =====
model:
  backbone: "InstaDeepAI/nucleotide-transformer-v2-500m-multi-species"
  head_type: "attention_pool"
  head_config:
    hidden_dim: 512
    num_attention_heads: 4
    dropout: 0.15
  freeze_backbone: false
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: ["query", "key", "value"]
  gradient_checkpointing: true
  trust_remote_code: true

# ===== Data =====
data:
  fasta_path: "/work/ymj1123ntu/data/reads_258M.fa"
  labels_path: "/work/ymj1123ntu/data/labels_258M.tsv"
  val_ratio: 0.02
  seed: 42
  max_token_length: 32
  task: "genus"
  rc_augment: true

# ===== Training =====
training:
  batch_size: 128           # per-GPU  (128 × 64 GPUs = 8192 effective batch)
  eval_batch_size: 512
  gradient_accumulation_steps: 1
  num_epochs: 15            # warm-start from v9 best.pt
  learning_rate: 3.0e-4
  backbone_lr: 2.0e-5
  weight_decay: 0.02
  warmup_ratio: 0.03
  amp: true
  max_grad_norm: 5.0
  early_stopping_patience: 5   # give more room to converge than v10 (patience=3)
  num_workers: 8
  label_smoothing: 0.0
  class_weights: false          # KEY FIX: remove distorted weighting from v10
  logit_adjustment: false

# ===== Output =====
output:
  dir: "/work/ymj1123ntu/checkpoints/nt_token_genus_v12_258M"
