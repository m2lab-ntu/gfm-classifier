# ============================================================
# DNABERT-2 (BPE) — Genus Classification
# ============================================================
# Tests whether learned (BPE) tokenization outperforms fixed k-mer.
# DNABERT-2 backbone is ~117M params, uses MosaicBERT-style attention.
# kmer_preprocess=null because the BPE tokenizer consumes raw DNA directly.
# ============================================================

# ===== Model =====
model:
  backbone: "zhihan1996/DNABERT-2-117M"
  backbone_loader: "base"           # AutoModel (no MLM head available)
  head_type: "attention_pool"
  head_config:
    hidden_dim: 512
    num_attention_heads: 4
    dropout: 0.15
  freeze_backbone: false
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  # DNABERT-2 uses fused QKV (Wqkv). If LoRA fails to find target, first run
  # once with use_lora=false to inspect module names, then adjust.
  lora_target_modules: ["Wqkv"]
  gradient_checkpointing: false     # custom arch; disable to avoid surprises

# ===== Data =====
data:
  fasta_path: "/work/ymj1123ntu/gfm_embedding_classification/data/balanced_5M/reads_5M.fa"
  labels_path: "/work/ymj1123ntu/gfm_embedding_classification/data/balanced_5M/labels_5M.tsv"
  val_ratio: 0.1
  seed: 42
  # BPE compresses 150bp to ~25-40 tokens on average; 64 leaves headroom.
  max_token_length: 64
  task: "genus"
  rc_augment: true
  # BPE tokenizer handles the raw sequence — no pre-splitting needed.
  kmer_preprocess: null

# ===== Training =====
training:
  batch_size: 256
  eval_batch_size: 512
  gradient_accumulation_steps: 1
  num_epochs: 30
  learning_rate: 5.0e-4
  backbone_lr: 3.0e-5
  weight_decay: 0.02
  warmup_ratio: 0.05
  amp: true
  max_grad_norm: 5.0
  early_stopping_patience: 5
  num_workers: 4
  label_smoothing: 0.0
  class_weights: false
  max_class_weight: 10.0
  phase1_epochs: 0

# ===== Output =====
output:
  dir: "/work/ymj1123ntu/token_level_gfm_classifier/results/dnabert2_token_genus_5M"
