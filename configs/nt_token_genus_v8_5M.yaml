# ============================================================
# Token-level GFM Classifier — Genus Classification (v8)
# ============================================================
# v4 baseline: 55.29% (RC TTA), 500K reads, imbalanced
# v8: same architecture, but trained on 5M BALANCED reads
#     (10x data, species-balanced subsampling from full 258M FASTA)
# ============================================================

# ===== Model =====
model:
  backbone: "InstaDeepAI/nucleotide-transformer-v2-500m-multi-species"
  head_type: "attention_pool"
  head_config:
    hidden_dim: 512
    num_attention_heads: 4
    dropout: 0.15
  freeze_backbone: false
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: ["query", "key", "value"]
  gradient_checkpointing: true

# ===== Data =====
data:
  fasta_path: "/work/ymj1123ntu/gfm_embedding_classification/data/balanced_5M/reads_5M.fa"
  labels_path: "/work/ymj1123ntu/gfm_embedding_classification/data/balanced_5M/labels_5M.tsv"
  val_ratio: 0.1
  seed: 42
  max_token_length: 32
  task: "genus"
  rc_augment: true

# ===== Training =====
training:
  batch_size: 32
  eval_batch_size: 64
  gradient_accumulation_steps: 2
  num_epochs: 30
  learning_rate: 5.0e-4
  backbone_lr: 3.0e-5
  weight_decay: 0.02
  warmup_ratio: 0.05
  amp: true
  max_grad_norm: 5.0
  early_stopping_patience: 7
  num_workers: 4
  label_smoothing: 0.0
  class_weights: false
  max_class_weight: 10.0
  phase1_epochs: 3
  phase1_lr: 5.0e-4

# ===== Output =====
output:
  dir: "/work/ymj1123ntu/token_level_gfm_classifier/results/nt_token_genus_lora_v8_5M"
