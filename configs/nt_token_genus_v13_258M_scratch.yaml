# ============================================================
# Token-level GFM Classifier — Genus, Full 258M Dataset (v13)
# ============================================================
# v13: 258M full data, class_weights=FALSE, FROM SCRATCH
#      Parallel run to v12 (warm-start) to compare whether
#      v9 warm-start helps or hurts on 258M unbalanced data.
#      No init_from — random head + fresh LoRA weights.
# ============================================================

# ===== Model =====
model:
  backbone: "InstaDeepAI/nucleotide-transformer-v2-500m-multi-species"
  head_type: "attention_pool"
  head_config:
    hidden_dim: 512
    num_attention_heads: 4
    dropout: 0.15
  freeze_backbone: false
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: ["query", "key", "value"]
  gradient_checkpointing: true
  trust_remote_code: true

# ===== Data =====
data:
  fasta_path: "/work/ymj1123ntu/data/reads_258M.fa"
  labels_path: "/work/ymj1123ntu/data/labels_258M.tsv"
  val_ratio: 0.02
  seed: 42
  max_token_length: 32
  task: "genus"
  rc_augment: true

# ===== Training =====
training:
  batch_size: 128           # per-GPU  (128 × 64 GPUs = 8192 effective batch)
  eval_batch_size: 512
  gradient_accumulation_steps: 1
  num_epochs: 25            # from scratch needs more epochs
  learning_rate: 3.0e-4
  backbone_lr: 2.0e-5
  weight_decay: 0.02
  warmup_ratio: 0.03
  amp: true
  max_grad_norm: 5.0
  early_stopping_patience: 5
  num_workers: 8
  label_smoothing: 0.0
  class_weights: false
  logit_adjustment: false

# ===== Output =====
output:
  dir: "/work/ymj1123ntu/checkpoints/nt_token_genus_v13_258M_scratch"
