data:
  fasta_path: /work/ymj1123ntu/gfm_embedding_classification/data/balanced_5M/reads_5M.fa
  labels_path: /work/ymj1123ntu/gfm_embedding_classification/data/balanced_5M/labels_5M.tsv
  max_token_length: 32
  rc_augment: true
  seed: 42
  task: genus
  val_ratio: 0.1
model:
  backbone: InstaDeepAI/nucleotide-transformer-v2-500m-multi-species
  freeze_backbone: false
  gradient_checkpointing: true
  head_config:
    dropout: 0.15
    hidden_dim: 512
    num_attention_heads: 4
  head_type: attention_pool
  lora_alpha: 32
  lora_dropout: 0.05
  lora_r: 16
  lora_target_modules:
  - query
  - key
  - value
  use_lora: true
output:
  dir: /work/ymj1123ntu/token_level_gfm_classifier/results/nt_token_genus_lora_v8_5M
training:
  amp: true
  backbone_lr: 3.0e-05
  batch_size: 32
  class_weights: false
  early_stopping_patience: 7
  eval_batch_size: 64
  gradient_accumulation_steps: 2
  label_smoothing: 0.0
  learning_rate: 0.0005
  max_class_weight: 10.0
  max_grad_norm: 5.0
  num_epochs: 30
  num_workers: 4
  phase1_epochs: 3
  phase1_lr: 0.0005
  warmup_ratio: 0.05
  weight_decay: 0.02
